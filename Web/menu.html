<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Menu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --magenta: #8b0000;
      --cyan: #00e5ff;
      --red: #8b0000;
      --bg: #000000;
      --surface: #0d0d0d;
      --surface2: #151515;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Real logo image (logo.png) ───────────────────────────── */
    .logo-img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      mix-blend-mode: screen; /* pure black bg becomes invisible */
    }

    /* ── SVG fallback (used when logo.png not found) ──────────── */
    .sr-logo {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(139,0,0,0.25));
    }
    .sr-logo text {
      font-family: 'Pirata One', 'Palatino Linotype', serif;
      font-size: 112px;
      dominant-baseline: auto;
    }

    /* ── Gate Screen ──────────────────────────────────────────── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background:
        radial-gradient(ellipse at 40% 30%, rgba(139,0,0,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(80,0,0,0.25) 0%, transparent 50%),
        #000;
    }

    .gate-logo {
      display: none;
    }

    #gate p.subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    #gate form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      width: 100%;
      max-width: 320px;
    }

    #code-input {
      background: var(--surface2);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: var(--cyan);
      letter-spacing: 0.3em;
      text-align: center;
      outline: none;
      font-family: 'Inter', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #code-input::placeholder { color: #333; letter-spacing: 0.2em; }
    #code-input:focus {
      border-color: var(--magenta);
      box-shadow: 0 0 0 2px rgba(139,0,0,0.2), 0 0 12px rgba(0,229,255,0.1);
    }

    #gate button {
      background: transparent;
      border: 1px solid var(--magenta);
      border-radius: var(--radius);
      padding: 0.9rem;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--magenta);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    #gate button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--magenta);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    #gate button:hover::before { transform: translateX(0); }
    #gate button:hover { color: #fff; }
    #gate button span { position: relative; z-index: 1; }
    #gate button:active { transform: scale(0.98); }

    #error-msg {
      color: var(--magenta);
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.2em;
      letter-spacing: 0.05em;
    }

    .not-listed {
      color: #444;
      font-size: 0.78rem;
      text-align: center;
      margin-top: 0.4rem;
    }
    .not-listed a {
      color: var(--cyan);
      text-decoration: none;
    }
    .not-listed a:hover { text-decoration: underline; }

    .admin-link {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      color: #2a2a2a;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .admin-link:hover { color: var(--magenta); }

    /* ── Menu Screen ──────────────────────────────────────────── */
    #menu { display: none; }

    header {
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
      border-bottom: 1px solid #1a0000;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.3) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 60%, rgba(80,0,0,0.2) 0%, transparent 50%),
        #000;
    }

    .header-logo {
      display: none;
    }

    header .tagline {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }

    .contact-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1.4rem;
    }

    .contact-bar a {
      color: var(--cyan);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .contact-bar a:hover {
      color: #fff;
      text-shadow: 0 0 8px var(--cyan);
    }

    /* ── Category Nav ─────────────────────────────────────────── */
    .category-nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1.2rem 1rem;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid #111;
    }

    .cat-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 0.4rem 1rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .cat-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .cat-btn.active {
      background: var(--magenta);
      border-color: var(--magenta);
      color: #fff;
      font-weight: 600;
    }

    /* ── Menu Grid ────────────────────────────────────────────── */
    .menu-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .section-title {
      font-family: 'MedievalSharp', 'Palatino Linotype', serif;
      font-size: 1.6rem;
      color: var(--magenta);
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }

    .section-divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      margin-bottom: 2rem;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .menu-card {
      background: var(--surface);
      border: 1px solid #181818;
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--magenta);
      box-shadow: 0 0 20px rgba(139,0,0,0.15), 0 12px 30px rgba(0,0,0,0.6);
    }
    .menu-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      filter: saturate(0.9);
      transition: filter 0.3s;
    }
    .menu-card:hover img { filter: saturate(1.1); }

    .menu-card .card-body {
      padding: 1.2rem 1.4rem 1.4rem;
    }
    .menu-card .item-name {
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .menu-card .item-desc {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.65;
      margin-bottom: 0.9rem;
    }
    .menu-card .item-price {
      color: var(--cyan);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .status-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 0.6rem;
    }
    .status-soldout  { background: rgba(180,0,0,0.2); color: #ff4444; border: 1px solid #660000; }
    .status-preorder { background: rgba(245,166,35,0.15); color: #f5a623; border: 1px solid #7a5200; }
    .menu-card.is-soldout { opacity: 0.6; }
    .menu-card.is-soldout img { filter: grayscale(0.6); }
    .card-img-wrap { position: relative; }
    .play-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.65); border-radius: 999px;
      padding: 4px 10px; font-size: 0.72rem; color: #fff;
      letter-spacing: 0.05em; pointer-events: none;
    }
    .sheet-video {
      width: 100%; display: block; margin-top: 1rem;
      max-height: 340px; object-fit: cover; background: #000;
    }

    /* ── Product Detail Overlay ──────────────────────────────── */
    #product-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: flex-end;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 0.3s;
    }
    #product-overlay.open {
      background: rgba(0,0,0,0.75);
      pointer-events: all;
    }
    #product-sheet {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: #0d0d0d;
      border-top: 1px solid #222;
      border-radius: 20px 20px 0 0;
      padding: 0 0 2rem;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    #product-overlay.open #product-sheet {
      transform: translateY(0);
    }
    .sheet-drag {
      width: 40px; height: 4px;
      background: #333; border-radius: 99px;
      margin: 12px auto 0;
    }
    .sheet-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      margin-top: 1rem;
    }
    .sheet-body {
      padding: 1.4rem 1.5rem 0;
    }
    .sheet-category {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 0.4rem;
    }
    .sheet-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .sheet-price {
      font-size: 1.3rem;
      color: var(--magenta);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    .sheet-desc {
      color: #888;
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 1.6rem;
    }
    .sheet-order-btn {
      display: block;
      width: 100%;
      background: var(--magenta);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }
    .sheet-order-btn:hover { opacity: 0.85; }
    .sheet-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: #1e1e1e;
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      color: #666; font-size: 1.1rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .menu-card { cursor: pointer; }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #2a2a2a;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-top: 1px solid #111;
    }

    /* ── Scanline overlay ─────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Fade-in ──────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #menu.visible {
      display: block;
      animation: fadeUp 0.5s ease forwards;
    }
  </style>
</head>
<body>

<!-- Config loaded dynamically from server -->

<!-- Gate Screen -->
<div id="gate">
  <!-- Step 1: Identity -->
  <div id="step1">
    <p class="subtitle">Step 1 of 2 — Verified clients only</p>

    <form onsubmit="verifyIdentity(event)">
      <input
        id="identity-input"
        type="text"
        placeholder="@instagram  or  phone number"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        maxlength="50"
      />
      <button type="submit"><span>Next →</span></button>
      <p id="error-msg"></p>
      <p class="not-listed">Not on the list? Contact us to get access.</p>
    </form>
  </div>


  <!-- Step 2: Access Code -->
  <div id="step2" style="display:none">
    <p class="subtitle">Step 2 of 2 — Enter access code</p>
    <form onsubmit="verifyCode(event)">
      <input
        id="code-input"
        type="password"
        placeholder="· · · · · ·"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="30"
      />
      <button type="submit"><span>Enter</span></button>
      <p id="error-msg2"></p>
      <p class="not-listed" style="cursor:pointer" onclick="backToStep1()">← Go back</p>
    </form>
  </div>
</div>

<!-- Menu Screen -->
<div id="menu">
  <header>
    <div class="header-logo" id="header-logo-wrap"></div>
    <div class="tagline" id="header-tagline"></div>
    <div class="contact-bar">
      <a id="ig-link" href="#" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
        <span id="ig-text"></span>
      </a>
      <a id="phone-link" href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        <span id="phone-text"></span>
      </a>
    </div>
  </header>

  <nav class="category-nav" id="cat-nav"></nav>
  <main id="menu-content"></main>

  <footer>
    Private Menu
  </footer>
</div>

<!-- Product Detail Overlay -->
<div id="product-overlay" onclick="closeProduct(event)">
  <div id="product-sheet" style="position:relative">
    <div class="sheet-drag"></div>
    <button class="sheet-close" onclick="closeProductBtn()">✕</button>
    <img id="sheet-img" class="sheet-img" src="" alt=""/>
    <video id="sheet-video" class="sheet-video" style="display:none" controls playsinline autoplay muted loop></video>
    <div class="sheet-body">
      <div id="sheet-category" class="sheet-category"></div>
      <div id="sheet-name" class="sheet-name"></div>
      <div id="sheet-price" class="sheet-price"></div>
      <p id="sheet-desc" class="sheet-desc"></p>
      <a id="sheet-order" class="sheet-order-btn" href="#" target="_blank">📩 DM to Order</a>
    </div>
  </div>
</div>

<script>
  let CFG = {};

  /* ── Boot: load config from server ────────────────── */
  async function boot() {
    try {
      const res = await fetch('/api/config');
      CFG = await res.json();
    } catch(e) {
      // Fallback if not running on server
      CFG = { brand_name:'SR', tagline:'Private Collection',
              access_code:'VIP2025', ig_handle:'',
              phone:'', approved_clients:[], menu_items:[] };
    }
    injectLogo('gate-logo-wrap');
  }
  boot();


  /* ── Step 1: check identity on server ─────────────── */
  async function verifyIdentity(e) {
    e.preventDefault();
    const handle = document.getElementById('identity-input').value.trim();
    const err    = document.getElementById('error-msg');
    const btn    = document.querySelector('#step1 button');

    if (!handle) return;
    btn.disabled = true;
    btn.innerHTML = '<span>Checking…</span>';

    // Pre-check: call server with a dummy code just to see if handle exists
    try {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ handle, code: '___STEP1_CHECK___' })
      });
      const data = await res.json();

      if (res.status === 404) {
        // Not on list
        err.textContent = "You're not on the list. DM " + (CFG.ig_handle || '') + " to get access.";
        document.getElementById('identity-input').value = '';
      } else {
        // Found (401 = wrong code, which is expected here — handle exists)
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('code-input').focus();
        err.textContent = '';
      }
    } catch {
      err.textContent = 'Connection error. Make sure the server is running.';
    }

    btn.disabled = false;
    btn.innerHTML = '<span>Next →</span>';
  }

  /* ── Step 2: verify personal access code ──────────── */
  async function verifyCode(e) {
    e.preventDefault();
    const handle = document.getElementById('identity-input').value.trim();
    const code   = document.getElementById('code-input').value.trim();
    const err    = document.getElementById('error-msg2');
    const btn    = document.querySelector('#step2 button');

    btn.disabled = true;
    btn.innerHTML = '<span>Verifying…</span>';

    try {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ handle, code })
      });

      if (res.ok) {
        // Load tier-specific menu from server session
        const menuRes = await fetch('/api/menu');
        CFG = await menuRes.json();
        document.getElementById('gate').style.display = 'none';
        buildMenu();
        document.getElementById('menu').classList.add('visible');
      } else {
        err.textContent = 'Wrong access code. Try again.';
        document.getElementById('code-input').value = '';
        btn.disabled = false;
        btn.innerHTML = '<span>Enter</span>';
      }
    } catch {
      err.textContent = 'Connection error. Make sure the server is running.';
      btn.disabled = false;
      btn.innerHTML = '<span>Enter</span>';
    }
  }

  /* ── Go back to step 1 ─────────────────────────────── */
  function backToStep1() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    document.getElementById('identity-input').value = '';
    document.getElementById('code-input').value = '';
    document.getElementById('error-msg2').textContent = '';
  }

  /* ── Build menu ────────────────────────────────────── */
  function buildMenu() {
    const ig = CFG.ig_handle || '';
    document.getElementById('header-tagline').textContent  = CFG.tagline || '';
    document.getElementById('ig-text').textContent         = ig;
    document.getElementById('ig-link').href = 'https://instagram.com/' + ig.replace('@','');
    document.getElementById('phone-text').textContent      = CFG.phone || '';
    document.getElementById('phone-link').href = 'tel:' + (CFG.phone||'').replace(/\D/g,'');
    document.getElementById('footer-brand').textContent    = CFG.brand_name || 'SR';

    const MENU_ITEMS = CFG.menu_items || [];
    const categories = [...new Set(MENU_ITEMS.map(i => i.category))];
    const nav = document.getElementById('cat-nav');

    nav.appendChild(makeBtn('All', true, (e) => {
      nav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      document.querySelectorAll('.menu-section').forEach(s => s.style.display = '');
    }));
    categories.forEach(cat => {
      nav.appendChild(makeBtn(cat, false, (e) => {
        nav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => {
          s.style.display = s.dataset.cat === cat ? '' : 'none';
        });
      }));
    });

    const main = document.getElementById('menu-content');
    categories.forEach(cat => {
      const section = document.createElement('section');
      section.className = 'menu-section';
      section.dataset.cat = cat;
      section.innerHTML = `<h2 class="section-title">${cat}</h2><div class="section-divider"></div><div class="items-grid"></div>`;
      const grid = section.querySelector('.items-grid');
      MENU_ITEMS.filter(i => i.category === cat).forEach(item => {
        const card = document.createElement('div');
        const isSoldOut = item.status === 'soldout';
        const isPreOrder = item.status === 'preorder';
        card.className = 'menu-card' + (isSoldOut ? ' is-soldout' : '');
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${item.image}" alt="${item.name}" loading="lazy"/>
            ${item.video ? '<span class="play-badge">▶ Video</span>' : ''}
          </div>
          <div class="card-body">
            ${isSoldOut  ? '<span class="status-badge status-soldout">🚫 Sold Out</span>' : ''}
            ${isPreOrder ? '<span class="status-badge status-preorder">🔔 Pre-Order</span>' : ''}
            <h3 class="item-name">${item.name}</h3>
            <p class="item-desc">${item.description}</p>
            <span class="item-price">${item.price}</span>
          </div>`;
        card.addEventListener('click', () => openProduct(item));
        grid.appendChild(card);
      });
      main.appendChild(section);
    });
  }

  /* ── Product detail sheet ──────────────────────────── */
  function openProduct(item) {
    // Image vs video
    const sheetImg = document.getElementById('sheet-img');
    const sheetVid = document.getElementById('sheet-video');
    if (item.video) {
      sheetImg.style.display = 'none';
      sheetVid.style.display = 'block';
      sheetVid.src = item.video;
      sheetVid.play().catch(()=>{});
    } else {
      sheetImg.style.display = 'block';
      sheetVid.style.display = 'none';
      sheetVid.pause(); sheetVid.src = '';
    }
    sheetImg.src               = item.image || '';
    document.getElementById('sheet-category').textContent  = item.category || '';
    document.getElementById('sheet-name').textContent      = item.name || '';
    document.getElementById('sheet-price').textContent     = item.price || '';
    document.getElementById('sheet-desc').textContent      = item.description || '';

    // Status badge
    const existing = document.getElementById('sheet-status-badge');
    if (existing) existing.remove();
    if (item.status === 'soldout' || item.status === 'preorder') {
      const badge = document.createElement('span');
      badge.id = 'sheet-status-badge';
      badge.className = 'status-badge ' + (item.status === 'soldout' ? 'status-soldout' : 'status-preorder');
      badge.textContent = item.status === 'soldout' ? '🚫 Sold Out' : '🔔 Pre-Order';
      document.getElementById('sheet-name').before(badge);
    }

    // Order button
    const btn = document.getElementById('sheet-order');
    const ig = (CFG.ig_handle || '').replace('@','');
    btn.href = `https://instagram.com/${ig}`;
    if (item.status === 'soldout') {
      btn.textContent = '🚫 Currently Sold Out';
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
    } else if (item.status === 'preorder') {
      btn.textContent = '🔔 DM to Pre-Order';
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
    } else {
      btn.textContent = '📩 DM to Order';
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
    }

    document.getElementById('product-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeProductBtn() {
    document.getElementById('product-overlay').classList.remove('open');
    document.body.style.overflow = '';
    const v = document.getElementById('sheet-video');
    v.pause(); v.src = '';
  }

  function closeProduct(e) {
    if (e.target === document.getElementById('product-overlay')) closeProductBtn();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeProductBtn();
  });

  function makeBtn(label, active, onClick) {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (active ? ' active' : '');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }
</script>
<a href="/admin" class="admin-link">Admin</a>
</body>
